<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RobuxFree.gg - Get Free Robux</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#0F0F0F, #1A1A1A);
      font-family: "Arial", sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: #000;
      padding: 15px;
      text-align: center;
      border-bottom: 4px solid #00B543;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      color: white;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      background: #1F1F1F;
      border: 6px solid #00B543;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 181, 67, 0.7);
    }

    h1 {
      color: #00FF44;
      margin: 0 0 10px 0;
    }

    p {
      color: #AAA;
    }

    select, input {
      width: 100%;
      padding: 16px;
      margin: 15px 0;
      background: #2A2A2A;
      border: 2px solid #00B543;
      border-radius: 8px;
      color: white;
      font-size: 18px;
    }

    .btn {
      background: #00B543;
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .progress {
      margin-top: 30px;
      display: none;
    }

    .bar {
      height: 18px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(to right, #00B543, #00FF88);
      width: 0%;
      transition: width 0.4s;
    }

    .status {
      margin-top: 15px;
      font-size: 19px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">ROBUXFREE.GG</div>
  </div>

  <div class="container" id="main">
    <h1>FREE ROBUX GENERATOR 2026</h1>
    <p>Daily Updated • Up to 10,000 Robux</p>

    <select id="amount">
      <option value="800">800 Robux</option>
      <option value="1500" selected>1,500 Robux</option>
      <option value="3500">3,500 Robux</option>
      <option value="7000">7,000 Robux</option>
      <option value="10000">10,000 Robux</option>
    </select>

    <input type="text" id="username" placeholder="Enter Your Roblox Username" />

    <button class="btn" onclick="startGenerator()">CLAIM FREE ROBUX</button>

    <p style="font-size:13px; margin-top:25px; color:#666;">This generator is 100% safe and updated for 2026</p>
  </div>

  <div class="progress" id="progress">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="status" id="status">Connecting to Roblox servers...</div>
  </div>

  <script>
    function startGenerator() {
      const username = document.getElementById("username").value.trim();
      if (username === "") {
        alert("Please enter your username!");
        return;
      }

      document.getElementById("main").style.display = "none";
      document.getElementById("progress").style.display = "block";

      let percent = 0;
      const fill = document.getElementById("fill");
      const status = document.getElementById("status");

      const interval = setInterval(() => {
        percent += Math.random() * 22 + 8;
        if (percent > 100) percent = 100;

        fill.style.width = percent + "%";

        if (percent < 40) status.textContent = "Connecting to Roblox...";
        else if (percent < 70) status.textContent = "Adding Robux to account...";
        else if (percent < 95) status.textContent = "Verifying transaction...";
        else status.textContent = "Almost done...";

        if (percent >= 100) {
          clearInterval(interval);
          
          setTimeout(() => {
            // BIG TROLL TIME
            document.body.innerHTML = `
              <div style="height:100vh; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; font-family:Arial;">
                <h1 style="font-size:60px; color:#FF0000;">😂 GOTCHA!</h1>
                <p style="font-size:28px; margin:20px;">You just got trolled ${username.toUpperCase()}!</p>
                
                <iframe width="560" height="315" 
                  src="https://www.youtube.com/embed/dQw4w9wgxcQ?autoplay=1" 
                  frameborder="0" allow="autoplay" allowfullscreen></iframe>
                
                <h2 style="margin-top:40px; color:#00FF00;">Do not trust random Robux generator sites!</h2>
                <p style="font-size:22px; max-width:600px;">Real Robux can only be bought from the official Roblox website.<br>
                Never give your password or click suspicious links.</p>
                
                <button onclick="location.reload()" style="margin-top:30px; padding:15px 40px; font-size:20px; background:#00B543; border:none; border-radius:8px; cursor:pointer;">
                  Try Again (lol)
                </button>
              </div>
            `;
          }, 800);
        }
      }, 180);
    }
  </script>

</body>
</html>
